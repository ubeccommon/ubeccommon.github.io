name: Regenerate Indexes & Deploy to Pages

on:
  push:
    branches:
      - main
    # Content-only trigger: ignore the bot's own regenerated indexes and CI edits,
    # otherwise the index-commit below would loop the workflow.
    paths-ignore:
      - '**/index.html'
      - '.github/**'
  # Manual trigger — run this from the Actions tab to force a rebuild + redeploy
  # of whatever is currently on main (used to un-stick a stale Pages deployment).
  workflow_dispatch:

# Least-privilege tokens: commit regenerated indexes (contents), publish to
# Pages (pages), and OIDC auth required by actions/deploy-pages (id-token).
permissions:
  contents: write
  pages: write
  id-token: write

# Serialise Pages publishes; never cancel an in-flight deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate directory indexes
        run: python gen_indexes_dynamic.py --repo-root .

      - name: Commit regenerated indexes (only if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No index changes to commit."
          else
            git add -A
            git commit -m "chore: regenerate directory indexes"
            git push
          fi

      # Build the CURRENT working tree (already contains the freshly regenerated
      # indexes) — so the published artifact and the repo are always in lock-step.
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
