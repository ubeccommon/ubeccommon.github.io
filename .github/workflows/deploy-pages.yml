name: Deploy site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5

      # 1) Build ONLY the root landing page with Jekyll (index.md -> index.html).
      - name: Build root with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      # 2) Overlay the OER tree verbatim, so raw .md and generated index.html
      #    are served at their literal paths (this is what viewer.html fetches).
      - name: Overlay OER content tree as static files
        run: |
          rm -rf ./_site/Pattern_Language_of_Place
          cp -r ./Pattern_Language_of_Place ./_site/Pattern_Language_of_Place

      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
