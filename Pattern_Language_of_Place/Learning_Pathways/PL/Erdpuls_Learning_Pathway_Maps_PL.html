<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Erdpuls — Mapy Ścieżek Edukacyjnych</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet" />

<style>
/* ── Design tokens ─────────────────────────────────────────────────────────── */
:root {
  /* Brand earth palette */
  --ink:        #1a1a14;
  --soil:       #1a3d6a;
  --moss:       #1f8a6e;
  --fern:       #5a8040;
  --sage:       #8fb86e;
  --meadow:     #c8e6a0;
  --parchment:  #f7f4ed;
  --cream:      #fefcf7;
  --warm-white: #fffef9;

  /* 4A stage palette */
  --awareness:      #e8a020;
  --awareness-bg:   #fef7e6;
  --awareness-dark: #92620a;
  --ack:            #c0521a;
  --ack-bg:         #fdf1eb;
  --ack-dark:       #7a3210;
  --attitude:       #2a5fa8;
  --attitude-bg:    #eaf1fb;
  --attitude-dark:  #1a3d6e;
  --action:         #1a4d2e;
  --action-bg:      #eaf4ee;
  --action-dark:    #0d2e1a;

  /* Convergence purple */
  --convergence:     #5e3da8;
  --convergence-bg:  #f2eefb;
  --convergence-bdr: #b09adb;

  /* Token colours */
  --token-coop:  #3d8f6a;
  --token-recip: #c0521a;
  --token-mutu:  #2a5fa8;
  --token-regen: #1a4d2e;

  /* Typography */
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body:    'DM Sans', system-ui, sans-serif;

  /* Spacing scale */
  --sp-xs: 0.25rem;
  --sp-sm: 0.5rem;
  --sp-md: 1rem;
  --sp-lg: 1.5rem;
  --sp-xl: 2rem;
  --sp-2xl: 3rem;

  /* Group accent colours (bg-grad start/end) — 7 groups */
  --g0-a: #1f8a6e; --g0-b: #156a52;
  --g1-a: #2066a8; --g1-b: #164880;
  --g2-a: #c0521a; --g2-b: #8a3a10;
  --g3-a: #1a7a5e; --g3-b: #105a44;
  --g4-a: #b06820; --g4-b: #7a4a10;
  --g5-a: #6640a0; --g5-b: #4a2880;
  --g6-a: #a02040; --g6-b: #701428;
}

/* ── Reset & base ──────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  font-size: 0.9375rem;
  line-height: 1.6;
  color: var(--ink);
  background: var(--parchment);
  min-height: 100vh;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
img { max-width: 100%; }

/* ── Header ────────────────────────────────────────────────────────────────── */
.site-header {
  background: linear-gradient(135deg, #1a3d6a 0%, #1a7a5e 60%, #2a9a6a 100%);
  color: white;
  padding: var(--sp-lg) var(--sp-xl);
  position: relative;
  overflow: hidden;
}
.site-header::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 80% 0%, rgba(255,255,255,0.06) 0%, transparent 55%),
    radial-gradient(ellipse at 10% 100%, rgba(0,0,0,0.2) 0%, transparent 50%);
  pointer-events: none;
}
.site-header__inner {
  position: relative;
  max-width: 1100px;
  margin: 0 auto;
}
.site-header__eyebrow {
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0.75;
  margin-bottom: 0.4em;
}
.site-header__title {
  font-family: var(--font-display);
  font-size: clamp(1.5rem, 4vw, 2.4rem);
  font-weight: 900;
  line-height: 1.1;
  margin-bottom: 0.35em;
}
.site-header__subtitle {
  font-size: 0.8rem;
  opacity: 0.8;
  font-weight: 300;
}

/* ── Group nav ─────────────────────────────────────────────────────────────── */
.group-nav {
  background: white;
  border-bottom: 1.5px solid rgba(0,0,0,0.08);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.group-nav__inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 var(--sp-xl);
  display: flex;
  gap: 0.25rem;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.group-btn {
  display: flex;
  align-items: center;
  gap: 0.4em;
  padding: 0.7rem 0.9rem;
  font-size: 0.78rem;
  font-weight: 600;
  color: #666;
  white-space: nowrap;
  border-radius: 0;
  border-bottom: 3px solid transparent;
  transition: all 0.18s;
}
.group-btn:hover { color: var(--moss); border-bottom-color: var(--meadow); }
.group-btn.is-active {
  color: white;
  border-radius: 0.5rem 0.5rem 0 0;
  border-bottom: 3px solid rgba(255,255,255,0.4);
}
.group-btn[data-group="0"].is-active { background: linear-gradient(135deg, var(--g0-a), var(--g0-b)); }
.group-btn[data-group="1"].is-active { background: linear-gradient(135deg, var(--g1-a), var(--g1-b)); }
.group-btn[data-group="2"].is-active { background: linear-gradient(135deg, var(--g2-a), var(--g2-b)); }
.group-btn[data-group="3"].is-active { background: linear-gradient(135deg, var(--g3-a), var(--g3-b)); }
.group-btn[data-group="4"].is-active { background: linear-gradient(135deg, var(--g4-a), var(--g4-b)); }
.group-btn[data-group="5"].is-active { background: linear-gradient(135deg, var(--g5-a), var(--g5-b)); }
.group-btn[data-group="6"].is-active { background: linear-gradient(135deg, var(--g6-a), var(--g6-b)); }

/* ── Main canvas ───────────────────────────────────────────────────────────── */
.canvas {
  max-width: 1100px;
  margin: 0 auto;
  padding: var(--sp-xl) var(--sp-xl) var(--sp-2xl);
  display: flex;
  flex-direction: column;
  gap: var(--sp-lg);
}

/* ── Group hero banner ─────────────────────────────────────────────────────── */
.group-hero {
  border-radius: 1rem;
  color: white;
  padding: var(--sp-lg) var(--sp-xl);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--sp-lg);
  flex-wrap: wrap;
}
.group-hero[data-group="0"] { background: linear-gradient(135deg, var(--g0-a) 0%, var(--g0-b) 100%); }
.group-hero[data-group="1"] { background: linear-gradient(135deg, var(--g1-a) 0%, var(--g1-b) 100%); }
.group-hero[data-group="2"] { background: linear-gradient(135deg, var(--g2-a) 0%, var(--g2-b) 100%); }
.group-hero[data-group="3"] { background: linear-gradient(135deg, var(--g3-a) 0%, var(--g3-b) 100%); }
.group-hero[data-group="4"] { background: linear-gradient(135deg, var(--g4-a) 0%, var(--g4-b) 100%); }
.group-hero[data-group="5"] { background: linear-gradient(135deg, var(--g5-a) 0%, var(--g5-b) 100%); }
.group-hero[data-group="6"] { background: linear-gradient(135deg, var(--g6-a) 0%, var(--g6-b) 100%); }

.group-hero__left { display: flex; flex-direction: column; gap: 0.3em; }
.group-hero__emoji { font-size: 2rem; line-height: 1; }
.group-hero__label { font-family: var(--font-display); font-size: 1.5rem; font-weight: 900; line-height: 1.15; }
.group-hero__ages  { font-size: 0.78rem; opacity: 0.8; font-weight: 400; }
.group-hero__tagline { font-size: 0.85rem; opacity: 0.9; font-style: italic; margin-top: 0.2em; }
.group-hero__right { text-align: right; }
.group-hero__zone-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.7; }
.group-hero__zone { font-size: 0.82rem; opacity: 0.9; margin-top: 0.2em; max-width: 260px; }

/* ── Pathway grid ──────────────────────────────────────────────────────────── */
.pathway-grid {
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: var(--sp-md);
  align-items: start;
}
@media (max-width: 740px) {
  .pathway-grid { grid-template-columns: 1fr; }
}

/* ── Left panel ────────────────────────────────────────────────────────────── */
.panel {
  background: white;
  border-radius: 1rem;
  border: 1.5px solid rgba(0,0,0,0.08);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.panel__head {
  font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: #888;
  padding: 0.6rem 0.9rem;
  background: var(--parchment);
  border-bottom: 1px solid rgba(0,0,0,0.07);
}
.node-list { display: flex; flex-direction: column; }
.node-item {
  display: flex;
  align-items: center;
  gap: 0.6em;
  padding: 0.7rem 0.9rem;
  border: none;
  border-left: 3px solid transparent;
  border-bottom: 1px solid rgba(0,0,0,0.06);
  text-align: left;
  background: white;
  cursor: pointer;
  transition: all 0.15s;
}
.node-item:last-child { border-bottom: none; }
.node-item:hover { background: var(--parchment); }
.node-item.is-active { border-left-color: currentColor; }
.node-item.is-active[data-stage="Awareness"]      { border-color: var(--awareness); background: var(--awareness-bg); }
.node-item.is-active[data-stage="Acknowledgment"] { border-color: var(--ack);       background: var(--ack-bg); }
.node-item.is-active[data-stage="Attitude"]       { border-color: var(--attitude);  background: var(--attitude-bg); }
.node-item.is-active[data-stage="Action"]         { border-color: var(--action);    background: var(--action-bg); }

.node-circle {
  width: 28px; height: 28px;
  border-radius: 50%;
  color: white;
  font-size: 0.78rem;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
[data-stage="Awareness"]      .node-circle { background: var(--awareness); }
[data-stage="Acknowledgment"] .node-circle { background: var(--ack); }
[data-stage="Attitude"]       .node-circle { background: var(--attitude); }
[data-stage="Action"]         .node-circle { background: var(--action); }

.node-meta { flex: 1; min-width: 0; }
.node-stage-label {
  font-size: 0.6rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #aaa;
}
.node-item.is-active[data-stage="Awareness"]      .node-stage-label { color: var(--awareness-dark); }
.node-item.is-active[data-stage="Acknowledgment"] .node-stage-label { color: var(--ack-dark); }
.node-item.is-active[data-stage="Attitude"]       .node-stage-label { color: var(--attitude-dark); }
.node-item.is-active[data-stage="Action"]         .node-stage-label { color: var(--action-dark); }

.node-title { font-size: 0.8rem; font-weight: 600; color: var(--ink); line-height: 1.25; }
.node-ring  { font-size: 0.65rem; color: #aaa; margin-top: 0.1em; }

/* ── Convergence toggle / panel ────────────────────────────────────────────── */
.convergence-toggle {
  padding: 0.6rem 0.9rem;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--convergence);
  text-align: left;
  border-top: 1px solid var(--convergence-bdr);
  background: var(--convergence-bg);
  transition: background 0.15s;
}
.convergence-toggle:hover { background: #ede7f8; }
.convergence-panel { padding: 0.6rem 0.9rem; background: var(--convergence-bg); display: flex; flex-direction: column; gap: 0.6rem; }
.convergence-item { font-size: 0.75rem; }
.convergence-event { font-weight: 700; color: var(--convergence); }
.convergence-meta  { color: #555; margin: 0.1em 0; }
.convergence-badge {
  display: inline-block;
  padding: 0.1em 0.5em;
  background: white;
  border: 1px solid var(--convergence-bdr);
  border-radius: 999px;
  font-size: 0.68rem;
  color: var(--convergence);
  font-weight: 600;
}

/* ── Right detail panel ────────────────────────────────────────────────────── */
.detail-panel {
  background: white;
  border-radius: 1rem;
  border: 1.5px solid rgba(0,0,0,0.08);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.detail-header {
  display: flex;
  align-items: center;
  gap: 0.8em;
  padding: var(--sp-md) var(--sp-lg);
  border-bottom: 1px solid rgba(0,0,0,0.07);
}
.detail-panel[data-stage="Awareness"]      .detail-header { background: var(--awareness-bg); }
.detail-panel[data-stage="Acknowledgment"] .detail-header { background: var(--ack-bg); }
.detail-panel[data-stage="Attitude"]       .detail-header { background: var(--attitude-bg); }
.detail-panel[data-stage="Action"]         .detail-header { background: var(--action-bg); }

.detail-header-circle {
  width: 42px; height: 42px;
  border-radius: 50%;
  color: white;
  font-size: 1.1rem;
  font-weight: 900;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.detail-panel[data-stage="Awareness"]      .detail-header-circle { background: var(--awareness); }
.detail-panel[data-stage="Acknowledgment"] .detail-header-circle { background: var(--ack); }
.detail-panel[data-stage="Attitude"]       .detail-header-circle { background: var(--attitude); }
.detail-panel[data-stage="Action"]         .detail-header-circle { background: var(--action); }

.detail-header-info {}
.detail-header-stage {
  font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
}
.detail-panel[data-stage="Awareness"]      .detail-header-stage { color: var(--awareness-dark); }
.detail-panel[data-stage="Acknowledgment"] .detail-header-stage { color: var(--ack-dark); }
.detail-panel[data-stage="Attitude"]       .detail-header-stage { color: var(--attitude-dark); }
.detail-panel[data-stage="Action"]         .detail-header-stage { color: var(--action-dark); }

.detail-header-title {
  font-family: var(--font-display);
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.25;
}

.detail-body { background: white; padding: var(--sp-lg); display: flex; flex-direction: column; gap: var(--sp-md); }

/* Field rows */
.field { display: flex; flex-direction: column; gap: 0.3em; }
.field-label {
  font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #999;
}
.field-value { font-size: 0.875rem; color: var(--ink); line-height: 1.55; }

/* Workshop pills */
.workshop-pills { display: flex; flex-wrap: wrap; gap: 0.35em; }
.pill {
  display: inline-block;
  padding: 0.2em 0.65em;
  background: var(--parchment);
  border: 1px solid rgba(0,0,0,0.12);
  border-radius: 999px;
  font-size: 0.72rem;
  color: #555;
}

/* Output box */
.output-box {
  background: var(--parchment);
  border-radius: 0.6rem;
  border: 1px solid rgba(0,0,0,0.08);
  padding: 0.75rem 0.9rem;
}

/* Two-column grid for token + clusters */
.detail-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-sm); }
@media (max-width: 540px) { .detail-meta-grid { grid-template-columns: 1fr; } }

.meta-card {
  border-radius: 0.6rem;
  border: 1px solid rgba(0,0,0,0.08);
  padding: 0.65rem 0.8rem;
}
.meta-card--token { background: white; }
.meta-card--clusters { background: var(--parchment); }

.token-value {
  font-size: 0.9rem;
  font-weight: 700;
}
.token-value.cooperation  { color: var(--token-coop); }
.token-value.reciprocity  { color: var(--token-recip); }
.token-value.mutualism    { color: var(--token-mutu); }
.token-value.regeneration { color: var(--token-regen); }
.token-value.mixed        { color: var(--moss); }

.cluster-tags { display: flex; flex-wrap: wrap; gap: 0.3em; margin-top: 0.3em; }
.cluster-tag {
  font-size: 0.68rem;
  padding: 0.15em 0.55em;
  border-radius: 999px;
  background: rgba(90,128,64,0.12);
  border: 1px solid rgba(90,128,64,0.25);
  color: var(--moss);
  font-weight: 500;
}

/* VAG bridge quote */
.vag-box {
  background: linear-gradient(135deg, #fffbee 0%, #fff7d6 100%);
  border: 1.5px solid #e8c84a;
  border-radius: 0.75rem;
  padding: 0.85rem 1rem;
  position: relative;
}
.vag-label {
  font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: #927a10; margin-bottom: 0.4em;
  display: flex; align-items: center; gap: 0.4em;
}
.vag-label::before { content: '◆'; font-size: 0.5rem; }
.vag-quote { font-style: italic; font-size: 0.875rem; color: #5a4a0a; line-height: 1.6; }

/* Horizontal divider */
.divider { height: 1px; background: rgba(0,0,0,0.07); margin: 0; }

/* ── Legend bar ────────────────────────────────────────────────────────────── */
.legend-bar {
  background: white;
  border-radius: 1rem;
  border: 1.5px solid rgba(0,0,0,0.08);
  padding: var(--sp-md) var(--sp-lg);
  display: flex;
  flex-direction: column;
  gap: var(--sp-sm);
}
.legend-head {
  font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #888;
}
.legend-stages { display: flex; flex-wrap: wrap; gap: 0.6rem; align-items: center; }
.legend-item { display: flex; align-items: center; gap: 0.4em; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.legend-dot--awareness      { background: var(--awareness); }
.legend-dot--acknowledgment { background: var(--ack); }
.legend-dot--attitude       { background: var(--attitude); }
.legend-dot--action         { background: var(--action); }
.legend-dot--convergence    { background: var(--convergence); }
.legend-text { font-size: 0.78rem; color: #555; font-weight: 500; }

/* Token reference (hidden by default) */
.token-toggle {
  font-size: 0.78rem; font-weight: 600; color: #666;
  display: inline-flex; align-items: center; gap: 0.3em;
  margin-top: var(--sp-xs);
  transition: color 0.15s;
}
.token-toggle:hover { color: var(--moss); }
.token-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.5rem;
  margin-top: var(--sp-sm);
}
@media (max-width: 480px) { .token-grid { grid-template-columns: 1fr; } }
.token-card {
  background: var(--parchment);
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 0.5rem;
  padding: 0.6rem 0.75rem;
}
.token-card__name { font-size: 0.78rem; font-weight: 700; }
.token-card__name.cooperation  { color: var(--token-coop); }
.token-card__name.reciprocity  { color: var(--token-recip); }
.token-card__name.mutualism    { color: var(--token-mutu); }
.token-card__name.regeneration { color: var(--token-regen); }
.token-card__desc { font-size: 0.72rem; color: #777; margin-top: 0.15em; }

/* ── Footer ────────────────────────────────────────────────────────────────── */
.site-footer {
  text-align: center;
  font-size: 0.75rem;
  color: #aaa;
  padding-bottom: var(--sp-xl);
}
.site-footer a { color: #888; text-decoration: none; }
.site-footer a:hover { color: var(--moss); }

/* ── Fade-in animation ─────────────────────────────────────────────────────── */
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.anim-in { animation: fadeSlideIn 0.22s ease forwards; }

/* ── Print tweaks ──────────────────────────────────────────────────────────── */
@media print {
  .group-nav { position: static; }
  .canvas { padding: 1rem; }
}
</style>
</head>

<body>

<!-- ── NAGŁÓWEK STRONY ─────────────────────────────────────────────────────── -->
<header class="site-header">
  <div class="site-header__inner">
    <div class="site-header__eyebrow">Erdpuls · Centrum Edukacji na rzecz Zrównoważonego Rozwoju, Nauki Obywatelskiej i Wzajemnej Ekonomii</div>
    <h1 class="site-header__title">Mapy Ścieżek Edukacyjnych</h1>
    <p class="site-header__subtitle">Pięć ścieżek grup docelowych &middot; Głębokość Ścieżki 4A &middot; Pytania pomostowe Luki Wartości–Działania &middot; Integracja ekonomii tokenowej</p>
  </div>
</header>

<!-- ── WYBÓR GRUPY ──────────────────────────────────────────────────────────── -->
<nav class="group-nav" aria-label="Grupy docelowe">
  <div class="group-nav__inner" id="groupNav"></div>
</nav>

<!-- ── GŁÓWNY OBSZAR ───────────────────────────────────────────────────────── -->
<main class="canvas" id="mainCanvas">
  <!-- dynamicznie renderowany -->
</main>

<script>
// ── WSZYSTKIE DANE ─────────────────────────────────────────────────────────────
const GROUPS = [
  // ── Pasmo A: Klasy 1–4 ────────────────────────────────────────────────────
  {
    id: "band-a",
    label: "Klasy 1–4",
    labelPlain: "Klasy 1–4 · Detektywi Ziemi",
    emoji: "🪱",
    ages: "Wiek 6–10 | Szkoła podstawowa etap I",
    tagline: "Detektywi Ziemi: Pierwsze spotkania z żywą glebą",
    entryZone: "Strefa B — Zewnętrzne Laboratorium Glebowe · Przewodnik 01",
    nodes: [

        experience: "Wspólny transgraniczny dokument zasad jakości (dwujęzyczny, CC BY-SA 4.0); szkielet formalnego wniosku partnerskiego INTERREG lub bilateralnego; protokół transgranicznej sieci nauki obywatelskiej; wzajemna wymiana facylitacyjna — facylitator z Niemiec prowadzi sesję w polskim miejscu partnerskim; facylitator z Polski prowadzi sesję w Erdpuls",
        output: "Dwujęzyczny transgraniczny dokument zasad jakości (licencjonowany OER); szkielet wniosku partnerskiego; protokół sieci nauki obywatelskiej; udokumentowane wzajemne wydarzenie facylitacyjne (ocenione z obu stron)",
        token: "Regeneracja + Mutualizm",
        vag: "Masz teraz działający dokument, sieć i wymianę facylitacyjną. Jaka jest jedna konkretna bariera, która pozostaje? Kto w tym pokoju ma moc, żeby ją usunąć — i co się stanie, jeśli wyjdziesz dzisiaj bez postawienia prośby?",
        clusters: ["Rozumienie ekonomii", "Uczenie się społeczno-emocjonalne", "Kompetencja technologiczna"],
      },
    ],
    convergences: [
      { event: "Transgraniczny projekt iNaturalist", with: "Artyści i Badacze (warstwa GIS)", nodes: "W2", tokens: "Mutualizm" },
      { event: "Wzajemna Wymiana Facylitacyjna", with: "Dowolna facylitowana grupa", nodes: "W4", tokens: "Regeneracja" },
      { event: "Doroczne Zgromadzenie Języka Wzorców", with: "Wszystkie grupy", nodes: "W4", tokens: "Mutualizm" },
    ],
  },
];

const TOKEN_DESCS = [
  { key: "Współpraca",  desc: "Wspólne działanie z innymi na rzecz wspólnego celu" },
  { key: "Wzajemność",  desc: "Dwukierunkowa wymiana wartości — dawanie i otrzymywanie" },
  { key: "Mutualizm",   desc: "Korzyść rozciągająca się poza uczestników na szerszą społeczność" },
  { key: "Regeneracja", desc: "Wymierna poprawa ekologiczna lub społeczna" },
];

// Etykiety etapów PL
const STAGE_LABELS = {
  "Awareness":      "Świadomość",
  "Acknowledgment": "Uznanie",
  "Attitude":       "Postawa",
  "Action":         "Działanie",
};

// ── Stan ───────────────────────────────────────────────────────────────────────
let activeGroup = 0;
let activeNode  = 0;
let showConvergence = false;
let showTokens  = false;

// ── Helpers ───────────────────────────────────────────────────────────────────
function tokenClass(token) {
  const t = token.toLowerCase();
  if (t.includes("+") || (t.includes("współpraca") && t.includes("wzaj"))) return "mixed";
  if (t.includes("współpraca"))  return "cooperation";
  if (t.includes("wzajemność"))  return "reciprocity";
  if (t.includes("mutualizm"))   return "mutualism";
  if (t.includes("regeneracja")) return "regeneration";
  if (t.includes("ziarno"))      return "cooperation";
  return "mixed";
}

function escHTML(str) {
  return str
    .replace(/&(?!amp;|lt;|gt;|quot;|#)/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

// ── Budowanie nawigacji grup ──────────────────────────────────────────────────
function buildNav() {
  const nav = document.getElementById("groupNav");
  nav.innerHTML = GROUPS.map((g, i) =>
    `<button class="group-btn${i === activeGroup ? " is-active" : ""}" data-group="${i}" onclick="selectGroup(${i})">
      <span>${g.emoji}</span><span>${g.label}</span>
    </button>`
  ).join("");
}

// ── Budowanie listy węzłów (lewy panel) ──────────────────────────────────────
function buildNodeList(group) {
  const items = group.nodes.map((n, i) =>
    `<button class="node-item${i === activeNode ? " is-active" : ""}"
        data-stage="${n.stage}"
        onclick="selectNode(${i})"
        aria-pressed="${i === activeNode ? "true" : "false"}">
      <div class="node-circle">${n.num}</div>
      <div class="node-meta">
        <div class="node-stage-label">${STAGE_LABELS[n.stage] || n.stage}</div>
        <div class="node-title">${n.title}</div>
        <div class="node-ring">${n.ring}</div>
      </div>
    </button>`
  ).join("");

  const convergenceItems = group.convergences.map(c =>
    `<div class="convergence-item">
      <div class="convergence-event">${c.event}</div>
      <div class="convergence-meta">Z: <strong>${c.with}</strong></div>
      <div><span class="convergence-badge">${c.nodes}</span> <span class="convergence-badge">${c.tokens}</span></div>
    </div>`
  ).join("");

  return `<div class="panel">
    <div class="panel__head">Mapa Ścieżki</div>
    <div class="node-list">${items}</div>
    <button class="convergence-toggle" onclick="toggleConvergence()">
      ${showConvergence ? "▲ Ukryj" : "▼ Pokaż"} Strefy Zbieżności
    </button>
    ${showConvergence ? `<div class="convergence-panel">${convergenceItems}</div>` : ""}
  </div>`;
}

// ── Budowanie panelu szczegółów (prawy panel) ─────────────────────────────────
function buildDetail(node) {
  const workshopPills = node.workshops.map(w => `<span class="pill">${w}</span>`).join("");
  const clusterTags   = node.clusters.map(c => `<span class="cluster-tag">${c}</span>`).join("");
  const stageLabel    = STAGE_LABELS[node.stage] || node.stage;

  return `<div class="detail-panel anim-in" data-stage="${node.stage}">
    <div class="detail-header">
      <div class="detail-header-circle">${node.num}</div>
      <div class="detail-header-info">
        <div class="detail-header-stage">${stageLabel} · ${node.ring}</div>
        <div class="detail-header-title">${node.title}</div>
      </div>
    </div>
    <div class="detail-body">

      <div class="field">
        <div class="field-label">Powiązane Warsztaty</div>
        <div class="workshop-pills">${workshopPills}</div>
      </div>

      <div class="divider"></div>

      <div class="field">
        <div class="field-label">Główne Doświadczenie</div>
        <div class="field-value">${escHTML(node.experience)}</div>
      </div>

      <div class="output-box">
        <div class="field-label" style="margin-bottom:0.35em">Produkt / Artefakt Dowodowy</div>
        <div class="field-value">${escHTML(node.output)}</div>
      </div>

      <div class="detail-meta-grid">
        <div class="meta-card meta-card--token">
          <div class="field-label">Zarobiony Token</div>
          <div class="token-value ${tokenClass(node.token)}" style="margin-top:0.3em">${node.token}</div>
        </div>
        <div class="meta-card meta-card--clusters">
          <div class="field-label">Klastry Kompetencji</div>
          <div class="cluster-tags">${clusterTags}</div>
        </div>
      </div>

      <div class="vag-box">
        <div class="vag-label">Pytanie Pomostowe Luki Wartości–Działania</div>
        <div class="vag-quote">"${escHTML(node.vag)}"</div>
      </div>

    </div>
  </div>`;
}

// ── Budowanie legendy ─────────────────────────────────────────────────────────
function buildLegend() {
  const stages = [
    { key: "awareness",      label: "Świadomość" },
    { key: "acknowledgment", label: "Uznanie" },
    { key: "attitude",       label: "Postawa" },
    { key: "action",         label: "Działanie" },
    { key: "convergence",    label: "Strefa Zbieżności" },
  ];
  const stageItems = stages.map(s =>
    `<div class="legend-item">
      <div class="legend-dot legend-dot--${s.key}"></div>
      <span class="legend-text">${s.label}</span>
    </div>`
  ).join("");

  const tokenCards = TOKEN_DESCS.map(t =>
    `<div class="token-card">
      <div class="token-card__name ${tokenClassFromKey(t.key)}">${t.key}</div>
      <div class="token-card__desc">${t.desc}</div>
    </div>`
  ).join("");

  return `<div class="legend-bar">
    <div class="legend-head">Legenda Etapów</div>
    <div class="legend-stages">${stageItems}</div>
    <div class="divider" style="margin:0.3rem 0"></div>
    <button class="token-toggle" onclick="toggleTokens()">
      ${showTokens ? "▲ Ukryj" : "▼ Pokaż"} Odniesienie do Ekonomii Tokenowej
    </button>
    ${showTokens ? `<div class="token-grid">${tokenCards}</div>` : ""}
  </div>`;
}

function tokenClassFromKey(key) {
  const k = key.toLowerCase();
  if (k.includes("współpraca")) return "cooperation";
  if (k.includes("wzajemność")) return "reciprocity";
  if (k.includes("mutualizm"))  return "mutualism";
  if (k.includes("regeneracja")) return "regeneration";
  return "";
}

// ── Budowanie stopki ──────────────────────────────────────────────────────────
function buildFooter() {
  return `<div class="site-footer">
    <div>© 2025–2026 Erdpuls · CC BY-NC-SA 4.0</div>
    <div style="margin-top:0.2em"><a href="mailto:erdpuls@ubec.network">erdpuls@ubec.network</a> · <a href="https://erdpuls.ubec.network">erdpuls.ubec.network</a></div>
  </div>`;
}

// ── Pełny render ──────────────────────────────────────────────────────────────
function render() {
  const group = GROUPS[activeGroup];
  const node  = group.nodes[activeNode];

  buildNav();

  const heroHTML = `<div class="group-hero" data-group="${activeGroup}">
    <div class="group-hero__left">
      <span class="group-hero__emoji">${group.emoji}</span>
      <div class="group-hero__label">${group.label}</div>
      <div class="group-hero__ages">${group.ages}</div>
      <div class="group-hero__tagline">${group.tagline}</div>
    </div>
    <div class="group-hero__right">
      <div class="group-hero__zone-label">Strefa Wejściowa</div>
      <div class="group-hero__zone">${group.entryZone}</div>
    </div>
  </div>`;

  const gridHTML = `<div class="pathway-grid">
    ${buildNodeList(group)}
    ${buildDetail(node)}
  </div>`;

  document.getElementById("mainCanvas").innerHTML =
    heroHTML + gridHTML + buildLegend() + buildFooter();
}

// ── Obsługa zdarzeń ───────────────────────────────────────────────────────────
function selectGroup(idx) {
  activeGroup = idx;
  activeNode  = 0;
  showConvergence = false;
  render();
}

function selectNode(idx) {
  activeNode = idx;
  render();
  const detail = document.querySelector(".detail-panel");
  if (detail && window.innerWidth < 741) {
    setTimeout(() => detail.scrollIntoView({ behavior: "smooth", block: "start" }), 50);
  }
}

function toggleConvergence() {
  showConvergence = !showConvergence;
  render();
}

function toggleTokens() {
  showTokens = !showTokens;
  render();
}

// ── Inicjalizacja ─────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
