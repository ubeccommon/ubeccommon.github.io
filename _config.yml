title: "Ubuntu Bioregional Economic Commons"
description: "Open-source sustainability literacy, citizen science, reciprocal economics, living labs, prototypes, and documentation."
theme: jekyll-theme-cayman
show_downloads: false
github:
  is_project_page: false

plugins:
  - jekyll-relative-links
relative_links:
  enabled: true
  collections: true

# The OER content tree is served by the generated index.html files (via Pages)
# and by viewer.html fetching raw .md from raw.githubusercontent.com — Jekyll does
# not render it. layout:none keeps Jekyll from choking on OER markdown (kramdown-gfm).
defaults:
  - scope: { path: "Pattern_Language_of_Place" }
    values: { layout: none, sitemap: false }
  - scope: { path: "", type: "pages" }
    values: { layout: "default" }
