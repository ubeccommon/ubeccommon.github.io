# Site settings
title: "Ubuntu Bioregional Economic Commons"
description: "Open-source sustainability literacy, citizen science, reciprocal economics, living labs, prototypes, and documentation."
theme: jekyll-theme-cayman
show_downloads: false
github:
  is_project_page: false

plugins:
  - jekyll-relative-links
relative_links:
  enabled: true
  collections: true

# Keep build scripts out of the published output.
exclude:
  - gen_indexes_dynamic.py
  - discover_directories.py
  - push.sh
  - structure.txt

# Force the raw OER files (.md + generated .html) into _site verbatim, so
# viewer.html can fetch the raw markdown. Without this, Jekyll consumes the
# .md into an .html permalink and the raw .md 404s.
include:
  - "Pattern_Language_of_Place"

# Single defaults block (YAML allows only one 'defaults:' key):
#  - the OER tree is NOT rendered by Jekyll (layout:none avoids the kramdown-gfm
#    crash and keeps the files intact);
#  - the landing page and other root pages still get the Cayman layout.
defaults:
  - scope:
      path: "Pattern_Language_of_Place"
    values:
      layout: none
      sitemap: false
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
